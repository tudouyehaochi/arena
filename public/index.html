<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arena Chat</title>
<style>
:root { --ink:#1f2937; --muted:#6b7280; --panel:#fff; --line:#dbe3ef; --brand:#2563eb; --radius:16px; }
* { box-sizing:border-box; }
html,body { width:100%; overflow-x:hidden; }
body { margin:0; font-family:"Avenir Next","SF Pro Text","PingFang SC",sans-serif; color:var(--ink); background:radial-gradient(1200px 600px at -20% -10%, #dbeafe 0, #f3f6fb 50%),radial-gradient(1200px 700px at 120% 120%, #e0f2fe 0, #f3f6fb 55%); min-height:100vh; min-height:100dvh; }
.layout { display:grid; grid-template-rows:auto 1fr auto; gap:10px; padding:12px; min-height:100vh; min-height:100dvh; max-width:1100px; margin:0 auto; }
.card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 8px 24px rgba(15,23,42,.06); }
.top { padding:12px 14px; display:grid; gap:10px; }
.row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.title { font-size:18px; font-weight:700; }
.meta { font-size:12px; color:var(--muted); }
.tag { font-size:12px; padding:4px 10px; border-radius:999px; background:#eef2ff; color:#334155; font-weight:600; }
.input,.select { border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:#fff; }
.btn { border:none; background:var(--brand); color:#fff; padding:9px 12px; min-height:40px; border-radius:10px; font-weight:700; cursor:pointer; }
.ghost { background:#fff; color:#1e3a8a; border:1px solid #bfdbfe; }
.danger { background:#fff1f2; color:#9f1239; border:1px solid #fecdd3; }
.rooms { display:flex; gap:6px; flex-wrap:wrap; }
.rbtn { font-size:12px; border:1px solid var(--line); background:#fff; padding:7px 10px; border-radius:999px; cursor:pointer; }
.rbtn.active { background:#dbeafe; border-color:#93c5fd; }
.main { display:flex; flex-direction:column; min-height:0; overflow:hidden; }
.header { padding:12px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; background:linear-gradient(180deg,#fff,#f9fbff); }
.messages { flex:1; min-height:0; overflow:auto; padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.msg-row { display:flex; align-items:flex-start; gap:8px; }
.msg-row.mine { justify-content:flex-end; }
.msg-avatar { width:28px; height:28px; border-radius:999px; display:grid; place-items:center; font-size:12px; font-weight:700; color:#fff; flex:0 0 auto; }
.msg { width:fit-content; max-width:min(86%,72ch); overflow-wrap:anywhere; padding:10px 12px; border-radius:16px; border:1px solid var(--line); box-shadow:0 4px 14px rgba(15,23,42,.04); }
.msg .m { font-size:11px; color:var(--muted); margin-bottom:4px; }
.msg .u { font-size:11px; color:#475569; margin-top:6px; padding-top:6px; border-top:1px dashed #d1d5db; }
.msg.system { align-self:center; background:#f8fafc; color:var(--muted); max-width:95%; text-align:center; }
.msg.mine { background:#ecfdf5; border-color:#bbf7d0; }
.msg.other { background:#fff; }
.composer { display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--line); background:#fff; align-items:flex-end; position:sticky; bottom:0; padding-bottom:calc(10px + env(safe-area-inset-bottom)); }
#username { width:110px; }
#msg { flex:1; min-height:42px; max-height:140px; resize:none; font:inherit; line-height:1.4; }
#send-mode { min-height:42px; }
@media (max-width:560px) { .composer { display:grid; grid-template-columns:1fr 1fr; } #username,#send-mode{width:100%;} #msg,#send{grid-column:1/span 2;} #send{width:100%;} }
</style>
</head>
<body>
<div class="layout">
  <section class="card top">
    <div class="row"><div class="title">Arena Chat</div><span id="env" class="meta"></span><span class="meta" id="status">connecting...</span></div>
    <div class="row">
      <span id="room" class="tag"></span>
      <button id="to-dashboard" class="btn ghost">Dashboard</button>
      <button id="to-admin" class="btn ghost">Admin</button>
      <button id="new-room" class="btn ghost">+ 新建</button>
      <button id="del-room" class="btn danger">删除当前</button>
      <input id="room-q" class="input" placeholder="筛选 room id" style="min-width:180px">
    </div>
    <div id="rooms" class="rooms"></div>
  </section>

  <section class="card main">
    <div class="header"><strong>Chat</strong><span class="meta">会话专注模式</span></div>
    <div id="messages" class="messages"></div>
    <div class="composer">
      <input id="username" class="input" value="镇元子" placeholder="Name">
      <select id="send-mode" class="select"><option value="shift_enter" selected>Shift+Enter 发送</option><option value="enter">Enter 发送</option></select>
      <textarea id="msg" class="input" rows="1" placeholder="Type a message..."></textarea>
      <button id="send" class="btn">Send</button>
    </div>
  </section>
</div>
<script src="/js/chat-app.js"></script>
</body>
</html>
